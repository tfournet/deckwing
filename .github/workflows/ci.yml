name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Validate design system JSON
        run: |
          for f in src/config/design/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" || (echo "INVALID JSON: $f" && exit 1)
          done
          echo "All design JSON files valid"

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Verify build output exists
        run: test -f dist/index.html

      - name: Validate install scripts
        run: |
          bash -n scripts/install.sh
          pwsh -Command "Get-Content scripts/install.ps1 | Out-Null" 2>/dev/null || true
          grep -q "tfournet" scripts/install.sh || (echo "ERROR: install.sh missing repo reference" && exit 1)
          grep -q "tfournet" scripts/install.ps1 || (echo "ERROR: install.ps1 missing repo reference" && exit 1)
