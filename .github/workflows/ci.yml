name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Verify build output exists
        run: test -f dist/index.html

      - name: Validate install scripts
        run: |
          bash -n scripts/install.sh
          pwsh -Command "Get-Content scripts/install.ps1 | Out-Null" 2>/dev/null || true
          grep -q "tfournet" scripts/install.sh || (echo "ERROR: install.sh missing repo reference" && exit 1)
          grep -q "tfournet" scripts/install.ps1 || (echo "ERROR: install.ps1 missing repo reference" && exit 1)

  # On push to main (not PRs), rebuild dist/ and commit if changed
  update-dist:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Commit dist/ if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ -f
          git diff --cached --quiet && echo "dist/ unchanged" || (git commit -m "build: update dist/" && git push)
